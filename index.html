<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Table</title>
  </head>
  <body>
    <h1 align="center">Time Table</h1>
    <table border="1px" align="center" cellpadding="10" celspacing="0">
      <tr>
        <th rowspan="3">Day</th>
        <th colspan="3">Seminar</th>
      </tr>
      <tr>
        <th colspan="2">Shedule</th>
        <th rowspan="2">Topic</th>
      </tr>
      <tr>
        <th>Start</th>
        <th>End</th>
      </tr>
      <tr>
        <td rowspan="2">Monday</td>
        <td rowspan="2">08:00 AM</td>
        <td rowspan="2">05:00 PM</td>
        <td>Introduction</td>
      </tr>
      <tr>
        <td align="center">Uses</td>
      </tr>
      <tr>
        <td rowspan="4">Tuesday</td>
        <td>8:00 AM</td>
        <td>11:00 PM</td>
        <td align="center">--</td>
      </tr>

      <tr>
        <td>2:00 PM</td>
        <td>8:00 PM</td>
        <td align="center">Learn</td>
      </tr>
      <tr>
        <td>2:00 PM</td>
        <td>8:00 PM</td>
        <td rowspan="2" ; align="center">--</td>
      </tr>
      <tr>
        <td>10:00 AM</td>
        <td>1:00 PM</td>
      </tr>
      <tr>
        <td>Wed-Fri</td>
        <td colspan="2" align="center">Full Day</td>
        <td>Practical</td>
      </tr>
      <tr>
        <td>Sat-Sun</td>
        <td colspan="2">11:00 AM - 5:00 PM</td>
        <td>Extra Class</td>
      </tr>
    </table>
  </body>
</html>
